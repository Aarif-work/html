<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Details | Mohamed Aarif</title>
    <link rel="icon" href="asserts/favicon/web/favicon.ico" type="image/x-icon">
    <link rel="apple-touch-icon" href="asserts/favicon/web/apple-touch-icon.png">
    <link rel="manifest" href="asserts/favicon/site.webmanifest">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="project-details.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@300;400;500;600&display=swap"
        rel="stylesheet">
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
</head>

<body>
    <!-- Premium Page Loader -->
    <div class="page-loader" id="pageLoader">
        <div class="loader"></div>
        <div class="loader-text">Project Deep Dive</div>
    </div>

    <header>
        <nav>
            <div class="nav-brand">Mohamed Aarif</div>
            <button class="mobile-menu-toggle" aria-label="Toggle menu">
                <span></span><span></span><span></span>
            </button>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="index.html#portfolio">Projects</a></li>
                <li><a href="achievements.html">Achievements</a></li>
                <li><a href="mentors.html">Mentors</a></li>
                <li><a href="index.html#contact">Reach Out</a></li>
            </ul>
        </nav>
    </header>

    <main id="project-details-container">
        <div class="loading-state">
            <div class="loader"></div>
            <p>Loading project masterpiece...</p>
        </div>
    </main>

    <script>
        // Page Loader Hider
        window.addEventListener('load', () => {
            const loader = document.getElementById('pageLoader');
            if (loader) loader.classList.add('hidden');
        });

        // --- FIREBASE CONFIGURATION ---
        const firebaseConfig = {
            apiKey: "AIzaSyAJco78wnwXIuvEHlVQEprZuA1BpkEykkg",
            authDomain: "my-portfolio-d1b18.firebaseapp.com",
            projectId: "my-portfolio-d1b18",
            storageBucket: "my-portfolio-d1b18.firebasestorage.app",
            messagingSenderId: "1082170997296",
            appId: "1:1082170997296:web:04b7efa6da70168f610bf5",
            measurementId: "G-RNRTHVFTNX"
        };

        // Initialize Firebase
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        async function fetchProjectDetails() {
            const params = new URLSearchParams(window.location.search);
            const projectId = params.get('id');
            const container = document.getElementById('project-details-container');

            if (!projectId) {
                container.innerHTML = '<div class="error-msg">Missing project identifier. Redirecting...</div>';
                setTimeout(() => window.location.href = 'projects.html', 3000);
                return;
            }

            try {
                console.log(`🔍 Querying Cloud DB for Project: ${projectId}`);
                const doc = await db.collection('projects').doc(projectId).get();

                if (doc.exists) {
                    renderProject(doc.data());
                } else {
                    console.error("❌ Document not found in 'projects' collection.");
                    container.innerHTML = `<div class="error-msg">Project not found in our records.</div>`;
                }

            } catch (error) {
                console.error('❌ Firebase Error:', error);
                container.innerHTML = `<div class="error-msg">Error connecting to cloud database. Please try again later.</div>`;
            }
        }

        function renderProject(project) {
            const container = document.getElementById('project-details-container');

            // Handle Tech Stack (Support CSV string or Array)
            const techItems = project.techstack
                ? project.techstack.toString().split(',').map(t => t.trim())
                : [];

            // Handle Gallery Images (Support CSV string or Array)
            const galleryImages = project.moreimages
                ? project.moreimages.toString().split(',').map(img => img.trim())
                : [];

            container.innerHTML = `
                <div class="details-hero" style="background: linear-gradient(rgba(10,10,10,0.8), rgba(10,10,10,0.9)), url('${project.mainimageurl || 'asserts/images/new backround image.jpg'}') center/cover;">
                    <div class="container">
                        <span class="category-badge">${project.category || 'Portfolio Edition'}</span>
                        <h1 class="project-title">${project.projecttitle || project.title || 'Untitled Project'}</h1>
                        <div class="tech-tags">
                            ${techItems.map(tech => `<span>${tech}</span>`).join('')}
                        </div>
                    </div>
                </div>

                <section class="details-content">
                    <div class="container project-main-grid">
                        <div class="description-side">
                            <h2>The Challenge & Innovation</h2>
                            <p>${project.description || 'No description provided.'}</p>
                            ${project.link ? `
                                <a href="${project.link}" target="_blank" class="hero-cta">Explore Live Product</a>
                            ` : ''}
                        </div>
                        <div class="image-main">
                            <img src="${project.mainimageurl || ''}" alt="Featured Image" class="featured-img">
                        </div>
                    </div>
                </section>

                ${galleryImages.length > 0 ? `
                <section class="project-gallery">
                    <div class="container">
                        <h2 class="section-title">Visual Showcase</h2>
                        <div class="gallery-grid">
                            ${galleryImages.map(img => `
                                <div class="gallery-card">
                                    <img src="${img}" alt="Gallery Showcase" class="gallery-item">
                                </div>
                            `).join('')}
                        </div>
                    </div>
                </section>
                ` : ''}

                <section class="project-nav">
                    <div class="container">
                        <a href="projects.html" class="back-link">← Back to Project Hub</a>
                    </div>
                </section>
            `;
        }

        // Initialize Fetch
        fetchProjectDetails();

        // Mobile menu toggle
        const mobileMenuToggle = document.querySelector('.mobile-menu-toggle');
        const navLinks = document.querySelector('.nav-links');
        if (mobileMenuToggle) {
            mobileMenuToggle.addEventListener('click', () => {
                navLinks.classList.toggle('active');
                mobileMenuToggle.classList.toggle('active');
            });
        }
    </script>
</body>

</html>
